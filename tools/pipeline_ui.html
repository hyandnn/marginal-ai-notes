<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Note Pipeline</title>
    <style>
      :root {
        --bg: #0b0f19;
        --muted: #94a3b8;
        --text: #e5e7eb;
        --border: rgba(148, 163, 184, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(96,165,250,0.18), transparent 55%),
                    radial-gradient(900px 700px at 80% 10%, rgba(52,211,153,0.14), transparent 60%),
                    var(--bg);
        color: var(--text);
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .title { font-weight: 700; }
      .sub { color: var(--muted); font-size: 12px; }
      main {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 58px);
      }
      .card {
        background: rgba(17, 24, 39, 0.82);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .card h2 {
        margin: 0;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: #dbeafe;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        background: rgba(96,165,250,0.15);
        border: 1px solid rgba(96,165,250,0.35);
        color: var(--text);
        padding: 7px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { border-color: rgba(96,165,250,0.65); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
      .watch-on { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.45); }
      .field { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
      input[type="text"] {
        min-width: 280px;
        background: rgba(2,6,23,0.6);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 9px;
        color: var(--text);
        font-size: 12px;
      }
      .list { overflow: auto; padding: 6px; flex: 1; }
      .item {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        padding: 8px 10px;
        border: 1px solid transparent;
        border-radius: 10px;
        cursor: pointer;
      }
      .item:hover { background: rgba(148,163,184,0.06); }
      .item.selected { border-color: rgba(96,165,250,0.45); background: rgba(96,165,250,0.08); }
      .item input { margin-top: 3px; }
      .item-body { flex: 1; min-width: 0; }
      .item .name { font-size: 12px; color: #e0f2fe; margin-bottom: 3px; word-break: break-all; }
      .item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
      .badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
      }
      .badge-new { color: rgba(96,165,250,0.95); border-color: rgba(96,165,250,0.35); }
      .badge-partial { color: rgba(251,191,36,0.95); border-color: rgba(251,191,36,0.35); }
      .badge-done { color: rgba(52,211,153,0.95); border-color: rgba(52,211,153,0.35); }
      .badge-error { color: rgba(251,113,133,0.95); border-color: rgba(251,113,133,0.35); }
      header .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .content { padding: 10px 12px; overflow: auto; flex: 1; min-height: 0; }
      .kv { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
      .pill {
        display: inline-flex;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 11px;
        margin-right: 6px;
      }
      .pill.ok { border-color: rgba(52,211,153,0.35); color: rgba(52,211,153,0.95); }
      .pill.skip { border-color: rgba(251,113,133,0.35); color: rgba(251,113,133,0.95); }
      .pill.watch { border-color: rgba(96,165,250,0.35); color: rgba(96,165,250,0.95); }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }
      th, td {
        border-bottom: 1px solid var(--border);
        padding: 6px 8px;
        text-align: left;
        vertical-align: top;
      }
      th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: rgba(17,24,39,0.95); }
      .action-write { color: rgba(52,211,153,0.95); }
      .action-skip { color: rgba(251,113,133,0.95); }
      .truncate { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .msg { font-size: 12px; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border); }
      @media (max-width: 980px) { main { grid-template-columns: 1fr; height: auto; } }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="title">Local Note Pipeline</div>
        <div class="sub" id="subline">加载中…</div>
      </div>
      <div class="field">
        <span>输出目录</span>
        <input id="outputDir" type="text" placeholder="~/Note/00_Inbox" />
      </div>
      <div class="actions">
        <button id="openRecordBtn" class="ghost" type="button">打开 Record</button>
        <button id="openOutputBtn" class="ghost" type="button">打开 Inbox</button>
      </div>
    </header>

    <main>
      <section class="card">
        <h2>JSONL 文件</h2>
        <div class="toolbar">
          <button id="refreshBtn" class="ghost">刷新</button>
          <button id="selectAllBtn" class="ghost">全选</button>
          <button id="selectPendingBtn" class="ghost">选未处理</button>
          <button id="filterPendingBtn" class="ghost">只看未处理</button>
          <button id="clearSelBtn" class="ghost">清空</button>
          <span class="sub" id="selCount">已选 0</span>
        </div>
        <div class="list" id="fileList"></div>
        <div class="msg" id="fileMsg">勾选 JSONL 后预览或转换。</div>
      </section>

      <section class="card">
        <h2>预览 / 转换</h2>
        <div class="toolbar">
          <label class="field"><input id="mergeBy" type="checkbox" /> merge</label>
          <label class="field"><input id="force" type="checkbox" /> force</label>
          <button id="previewBtn" class="ghost" disabled>预览</button>
          <button id="convertBtn" disabled>转换选中</button>
          <button id="watchBtn" class="ghost">开启监视</button>
        </div>
        <div class="content">
          <p class="kv" id="previewSummary">—</p>
          <div style="margin-bottom: 10px;">
            <span class="pill ok" id="writePill">write 0</span>
            <span class="pill skip" id="skipPill">skip 0</span>
            <span class="pill watch" id="watchPill">watch 关</span>
          </div>
          <div id="previewTableWrap"><p class="sub">暂无预览</p></div>
        </div>
        <div class="msg" id="actionMsg">去重状态：输出目录 <code>.pipeline-state.json</code></div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let allFiles = [];
      const selectedPaths = new Set();
      let watchPolling = null;
      let recordDirPath = "";
      let filterPendingOnly = false;

      const STATUS_LABEL = {
        new: "未处理",
        partial: "部分",
        done: "已完成",
        empty: "空文件",
        error: "错误"
      };

      function statusBadge(status) {
        const label = STATUS_LABEL[status] || status;
        const cls =
          status === "done" ? "badge-done"
          : status === "partial" ? "badge-partial"
          : status === "new" ? "badge-new"
          : "badge-error";
        return `<span class="badge ${cls}">${label}</span>`;
      }

      function fmtBytes(n) {
        const u = ["B","KB","MB","GB"];
        let i = 0, v = n;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return `${v.toFixed(i === 0 ? 0 : 1)} ${u[i]}`;
      }

      function fmtTime(ms) {
        return new Date(ms).toLocaleString();
      }

      function opts() {
        return {
          merge_by: $("mergeBy").checked ? "topic+url" : null,
          force: $("force").checked,
          output_dir: $("outputDir").value.trim() || null
        };
      }

      function setMsg(text, isError = false) {
        $("actionMsg").textContent = text;
        $("actionMsg").style.color = isError ? "rgba(251,113,133,0.95)" : "var(--muted)";
      }

      function updateSelUI() {
        $("selCount").textContent = `已选 ${selectedPaths.size}`;
        const has = selectedPaths.size > 0;
        $("previewBtn").disabled = !has;
        $("convertBtn").disabled = !has;
      }

      async function loadConfig() {
        const cfg = await (await fetch("/api/config")).json();
        $("subline").textContent = `时区 ${cfg.timezone} · http://127.0.0.1:${cfg.port}`;
        $("outputDir").value = cfg.default_output_dir;
        recordDirPath = cfg.record_dir || recordDirPath;
      }

      async function openPath(path) {
        const r = await fetch("/api/open-path", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || "无法打开目录");
      }

      function visibleFiles() {
        if (!filterPendingOnly) return allFiles;
        return allFiles.filter((f) => f.status === "new" || f.status === "partial");
      }

      function renderFileList(files) {
        allFiles = files;
        const shown = visibleFiles();
        const list = $("fileList");
        list.replaceChildren();
        shown.forEach((f) => {
          const row = document.createElement("div");
          row.className = "item" + (selectedPaths.has(f.path) ? " selected" : "");

          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = selectedPaths.has(f.path);
          cb.addEventListener("click", (e) => e.stopPropagation());

          const body = document.createElement("div");
          body.className = "item-body";
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = f.name;
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.innerHTML =
            `${statusBadge(f.status)} ` +
            `<span>${f.line_count ?? "?"} 行 · ${f.skip_count ?? 0}/${f.line_count ?? "?"} 已转换</span> ` +
            `<span>${fmtBytes(f.size)} · ${fmtTime(f.mtime_ms)}</span>`;
          body.appendChild(name);
          body.appendChild(meta);

          const toggle = () => {
            if (selectedPaths.has(f.path)) selectedPaths.delete(f.path);
            else selectedPaths.add(f.path);
            cb.checked = selectedPaths.has(f.path);
            row.classList.toggle("selected", cb.checked);
            updateSelUI();
          };

          cb.addEventListener("change", toggle);
          row.addEventListener("click", (e) => {
            if (e.target === cb) return;
            toggle();
          });

          row.appendChild(cb);
          row.appendChild(body);
          list.appendChild(row);
        });

        $("fileMsg").textContent = shown.length
          ? `显示 ${shown.length} / ${files.length} 个文件`
          : filterPendingOnly
            ? "没有未处理的 JSONL"
            : "Record 目录下暂无 .jsonl / .ndjson";
        $("filterPendingBtn").classList.toggle("watch-on", filterPendingOnly);
        updateSelUI();
      }

      async function refreshFiles() {
        const out = encodeURIComponent($("outputDir").value.trim());
        const data = await (await fetch(`/api/files?output_dir=${out}`)).json();
        recordDirPath = data.record_dir || recordDirPath;
        renderFileList(data.files || []);
      }

      function renderPreviewTable(batch) {
        const wrap = $("previewTableWrap");
        wrap.replaceChildren();

        const rows = [];
        (batch.previews || []).forEach((preview) => {
          if (preview.error) {
            rows.push(`<tr><td colspan="6" class="action-skip">${preview.file}: ${preview.error}</td></tr>`);
            return;
          }
          (preview.planned || []).forEach((p) => {
            const cls = p.action === "write" ? "action-write" : "action-skip";
            const action = p.action === "write" ? "write" : `skip (${p.reason})`;
            const url = p.url ? `<span title="${p.url}">${p.url.slice(0, 40)}…</span>` : "—";
            rows.push(`<tr>
              <td>${preview.filename || "—"}</td>
              <td class="truncate" title="${p.main_topic || ""}">${p.main_topic || "—"}</td>
              <td>${p.source || "—"}</td>
              <td class="truncate">${url}</td>
              <td class="${cls}">${action}</td>
              <td class="truncate" title="${p.out_path}">${p.out_path.split("/").pop()}</td>
            </tr>`);
          });
        });

        if (!rows.length) {
          wrap.innerHTML = "<p class='sub'>（空）</p>";
          return;
        }

        wrap.innerHTML = `<table>
          <thead><tr>
            <th>文件</th><th>主题</th><th>来源</th><th>URL</th><th>动作</th><th>输出</th>
          </tr></thead>
          <tbody>${rows.join("")}</tbody>
        </table>`;
      }

      async function preview() {
        if (!selectedPaths.size) return;
        setMsg("生成预览中…");
        const payload = { files: [...selectedPaths], ...opts() };
        const r = await fetch("/api/preview-batch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          setMsg(data.detail || "预览失败", true);
          return;
        }

        $("previewSummary").textContent =
          `${data.file_count} 个文件 · write ${data.total_write} · skip ${data.total_skip}`;
        $("writePill").textContent = `write ${data.total_write}`;
        $("skipPill").textContent = `skip ${data.total_skip}`;
        renderPreviewTable(data);
        setMsg("预览完成。");
      }

      async function convert() {
        if (!selectedPaths.size) return;
        $("convertBtn").disabled = true;
        setMsg("转换中…");
        try {
          const payload = { files: [...selectedPaths], ...opts() };
          const r = await fetch("/api/convert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await r.json();
          if (!r.ok || !data.ok) {
            setMsg(data.detail || "转换失败", true);
            return;
          }
          let msg = `完成 ${data.file_count} 个文件：写入 ${data.written.length}，跳过 ${data.skipped.length}`;
          if (data.errors?.length) msg += `，错误 ${data.errors.length}`;
          setMsg(msg + ` → ${data.output_dir}`);
          await Promise.all([preview(), refreshFiles()]);
        } catch (e) {
          setMsg(e.message, true);
        } finally {
          $("convertBtn").disabled = false;
          updateSelUI();
        }
      }

      async function refreshWatchStatus() {
        const st = await (await fetch("/api/watch/status")).json();
        $("watchPill").textContent = st.running
          ? `watch 开 · 已处理 ${st.processed_count}`
          : "watch 关";
        $("watchBtn").textContent = st.running ? "停止监视" : "开启监视";
        $("watchBtn").classList.toggle("watch-on", st.running);
        if (st.running && st.processed_recent?.length) {
          const last = st.processed_recent[st.processed_recent.length - 1];
          $("watchPill").title = `最近: ${last}`;
        }
      }

      async function toggleWatch() {
        const st = await (await fetch("/api/watch/status")).json();
        if (st.running) {
          await fetch("/api/watch/stop", { method: "POST" });
          setMsg("已停止监视 Record。");
        } else {
          await fetch("/api/watch/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(opts())
          });
          setMsg("已开始监视 Record（仅处理新文件）。");
        }
        await refreshWatchStatus();
      }

      function startWatchPolling() {
        if (watchPolling) return;
        watchPolling = setInterval(refreshWatchStatus, 3000);
      }

      $("refreshBtn").addEventListener("click", refreshFiles);
      $("openRecordBtn").addEventListener("click", () => {
        if (!recordDirPath) return setMsg("Record 路径未知", true);
        openPath(recordDirPath).catch((e) => setMsg(e.message, true));
      });
      $("openOutputBtn").addEventListener("click", () => {
        openPath($("outputDir").value.trim()).catch((e) => setMsg(e.message, true));
      });
      $("selectAllBtn").addEventListener("click", () => {
        visibleFiles().forEach((f) => selectedPaths.add(f.path));
        renderFileList(allFiles);
      });
      $("selectPendingBtn").addEventListener("click", () => {
        selectedPaths.clear();
        allFiles
          .filter((f) => f.status === "new" || f.status === "partial")
          .forEach((f) => selectedPaths.add(f.path));
        renderFileList(allFiles);
      });
      $("filterPendingBtn").addEventListener("click", () => {
        filterPendingOnly = !filterPendingOnly;
        renderFileList(allFiles);
      });
      $("clearSelBtn").addEventListener("click", () => {
        selectedPaths.clear();
        renderFileList(allFiles);
        $("previewTableWrap").innerHTML = "<p class='sub'>暂无预览</p>";
      });
      $("previewBtn").addEventListener("click", preview);
      $("convertBtn").addEventListener("click", convert);
      $("watchBtn").addEventListener("click", toggleWatch);
      ["mergeBy", "force", "outputDir"].forEach((id) => {
        $(id).addEventListener("change", () => {
          if (id === "outputDir") refreshFiles();
          else if (selectedPaths.size) preview();
        });
      });

      loadConfig()
        .then(refreshFiles)
        .then(refreshWatchStatus)
        .then(startWatchPolling)
        .catch((e) => setMsg(e.message, true));
    </script>
  </body>
</html>
