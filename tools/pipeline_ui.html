<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Note Pipeline</title>
    <style>
      :root {
        --bg: #0b0f19;
        --panel: #111827;
        --muted: #94a3b8;
        --text: #e5e7eb;
        --border: rgba(148, 163, 184, 0.18);
        --blue: #60a5fa;
        --green: #34d399;
        --red: #fb7185;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(1200px 800px at 10% 10%, rgba(96,165,250,0.18), transparent 55%),
                    radial-gradient(900px 700px at 80% 10%, rgba(52,211,153,0.14), transparent 60%),
                    var(--bg);
        color: var(--text);
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .title { font-weight: 700; letter-spacing: 0.2px; }
      .sub { color: var(--muted); font-size: 12px; }
      main {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 58px);
      }
      .card {
        background: rgba(17, 24, 39, 0.82);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .card h2 {
        margin: 0;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        color: #dbeafe;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        background: rgba(96,165,250,0.15);
        border: 1px solid rgba(96,165,250,0.35);
        color: var(--text);
        padding: 7px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { border-color: rgba(96,165,250,0.65); }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .danger {
        background: rgba(251, 113, 133, 0.12);
        border-color: rgba(251, 113, 133, 0.35);
      }
      .field {
        display: flex;
        gap: 10px;
        align-items: center;
        font-size: 12px;
        color: var(--muted);
      }
      input[type="text"] {
        width: 100%;
        background: rgba(2,6,23,0.6);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 9px;
        color: var(--text);
        outline: none;
        font-size: 12px;
      }
      label { user-select: none; }
      .list {
        overflow: auto;
        padding: 6px;
      }
      .item {
        padding: 10px 10px;
        border: 1px solid transparent;
        border-radius: 10px;
        cursor: pointer;
      }
      .item:hover { background: rgba(148,163,184,0.06); }
      .item.active {
        border-color: rgba(96,165,250,0.5);
        background: rgba(96,165,250,0.08);
      }
      .item .name { font-size: 12px; color: #e0f2fe; margin-bottom: 4px; }
      .item .meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
      .content {
        padding: 10px 12px;
        overflow: auto;
        min-height: 0;
      }
      .kv { font-size: 12px; color: var(--muted); margin: 0 0 10px; }
      .pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); font-size: 11px; margin-right: 6px; }
      .pill.ok { border-color: rgba(52,211,153,0.35); color: rgba(52,211,153,0.95); }
      .pill.skip { border-color: rgba(251,113,133,0.35); color: rgba(251,113,133,0.95); }
      pre {
        margin: 0;
        background: rgba(2,6,23,0.55);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 11px;
        color: #e5e7eb;
      }
      .msg { font-size: 12px; color: var(--muted); padding: 8px 12px; border-top: 1px solid var(--border); }
      @media (max-width: 980px) {
        main { grid-template-columns: 1fr; height: auto; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <div class="title">Local Note Pipeline</div>
        <div class="sub" id="subline">加载配置中…</div>
      </div>
      <div class="field">
        <span>输出目录</span>
        <input id="outputDir" type="text" placeholder="~/Note/00_Inbox" />
      </div>
    </header>

    <main>
      <section class="card">
        <h2>JSONL 文件</h2>
        <div class="toolbar">
          <button id="refreshBtn" class="ghost">刷新列表</button>
          <span class="sub" id="recordDirLine">—</span>
        </div>
        <div class="list" id="fileList"></div>
        <div class="msg" id="fileMsg">选择一个 JSONL 查看预览。</div>
      </section>

      <section class="card">
        <h2>预览 / 转换</h2>
        <div class="toolbar">
          <label class="field"><input id="mergeBy" type="checkbox" /> merge（topic+url）</label>
          <label class="field"><input id="force" type="checkbox" /> force（忽略去重）</label>
          <button id="previewBtn" class="ghost" disabled>刷新预览</button>
          <button id="convertBtn" disabled>执行转换</button>
        </div>
        <div class="content">
          <p class="kv" id="previewSummary">—</p>
          <div style="margin-bottom: 10px;">
            <span class="pill ok" id="writePill">write 0</span>
            <span class="pill skip" id="skipPill">skip 0</span>
          </div>
          <pre id="previewBox">暂无预览</pre>
        </div>
        <div class="msg" id="actionMsg">提示：去重状态保存在输出目录的 <code>.pipeline-state.json</code>。</div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let selectedFile = null;

      function fmtBytes(n) {
        if (!n && n !== 0) return "-";
        const u = ["B","KB","MB","GB"];
        let i = 0, v = n;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return `${v.toFixed(i === 0 ? 0 : 1)} ${u[i]}`;
      }

      function fmtTime(ms) {
        if (!ms) return "-";
        const d = new Date(ms);
        return d.toLocaleString();
      }

      function setMsg(text, isError=false) {
        const el = $("actionMsg");
        el.textContent = text;
        el.style.color = isError ? "rgba(251,113,133,0.95)" : "var(--muted)";
      }

      async function loadConfig() {
        const r = await fetch("/api/config");
        const cfg = await r.json();
        $("subline").textContent = `时区：${cfg.timezone}`;
        $("recordDirLine").textContent = `Record：${cfg.record_dir}`;
        $("outputDir").value = cfg.default_output_dir;
      }

      async function refreshFiles() {
        $("fileMsg").textContent = "加载中…";
        const r = await fetch("/api/files");
        const data = await r.json();
        $("recordDirLine").textContent = `Record：${data.record_dir}`;

        const list = $("fileList");
        list.replaceChildren();
        data.files.forEach((f) => {
          const div = document.createElement("div");
          div.className = "item";
          if (selectedFile && selectedFile.path === f.path) div.classList.add("active");

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = f.name;

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `${fmtBytes(f.size)} · ${fmtTime(f.mtime_ms)}`;

          div.appendChild(name);
          div.appendChild(meta);
          div.addEventListener("click", () => {
            selectedFile = f;
            [...list.querySelectorAll(".item")].forEach((x) => x.classList.remove("active"));
            div.classList.add("active");
            $("previewBtn").disabled = false;
            $("convertBtn").disabled = false;
            preview();
          });

          list.appendChild(div);
        });

        $("fileMsg").textContent = data.files.length ? "点击一个 JSONL 开始。" : "Record 目录下暂无 .jsonl / .ndjson";
      }

      async function preview() {
        if (!selectedFile) return;
        $("previewBox").textContent = "生成预览中…";
        const mergeBy = $("mergeBy").checked ? "topic+url" : "";
        const force = $("force").checked ? "true" : "false";
        const outputDir = encodeURIComponent($("outputDir").value.trim());
        const url = `/api/preview?file=${encodeURIComponent(selectedFile.path)}&merge_by=${encodeURIComponent(mergeBy)}&force=${force}&output_dir=${outputDir}`;
        const r = await fetch(url);
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          $("previewBox").textContent = err.detail || "预览失败";
          return;
        }
        const data = await r.json();
        const planned = data.planned || [];
        const write = planned.filter((p) => p.action === "write").length;
        const skip = planned.filter((p) => p.action === "skip").length;

        $("previewSummary").textContent =
          `${planned.length} 条记录（原始 ${data.total_records} 行） → 输出到 ${data.output_dir}`;
        $("writePill").textContent = `write ${write}`;
        $("skipPill").textContent = `skip ${skip}`;

        const lines = planned.map((p, idx) => {
          const head = p.action === "write" ? "[write]" : `[skip ${p.reason}]`;
          return `${String(idx+1).padStart(2,"0")} ${head} ${p.out_path}`;
        });
        $("previewBox").textContent = lines.join("\\n") || "（空）";
      }

      async function convert() {
        if (!selectedFile) return;
        const btn = $("convertBtn");
        btn.disabled = true;
        setMsg("转换中…");
        try {
          const payload = {
            file: selectedFile.path,
            merge_by: $("mergeBy").checked ? "topic+url" : null,
            force: $("force").checked,
            output_dir: $("outputDir").value.trim() || null
          };
          const r = await fetch("/api/convert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await r.json();
          if (!r.ok || data.ok !== true) {
            setMsg(data.detail || "转换失败", true);
            return;
          }
          setMsg(`完成：写入 ${data.written.length} 个，跳过 ${data.skipped.length} 个 → ${data.output_dir}`);
          await preview();
        } catch (e) {
          setMsg(e.message || String(e), true);
        } finally {
          btn.disabled = false;
        }
      }

      $("refreshBtn").addEventListener("click", refreshFiles);
      $("previewBtn").addEventListener("click", preview);
      $("convertBtn").addEventListener("click", convert);
      $("mergeBy").addEventListener("change", preview);
      $("force").addEventListener("change", preview);
      $("outputDir").addEventListener("change", preview);

      loadConfig().then(refreshFiles).catch((e) => setMsg(e.message || String(e), true));
    </script>
  </body>
</html>
