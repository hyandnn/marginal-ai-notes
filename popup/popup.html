<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>旁注追问设置</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <h1>旁注追问设置</h1>
    <p class="cgia-subtitle">Agent Sidenote</p>

    <div class="cgia-form-row">
      <label>模式</label>
      <select id="mode">
        <option value="mock">Mock（体验 UI，无需 Key）</option>
        <option value="api">API（调用大模型）</option>
      </select>
    </div>

    <div class="cgia-form-row">
      <label>服务商预设</label>
      <select id="providerPreset">
        <option value="deepseek">DeepSeek</option>
        <option value="openai">OpenAI</option>
        <option value="custom">自定义</option>
      </select>
    </div>

    <div class="cgia-form-row">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off" />
    </div>

    <div class="cgia-form-row">
      <label>模型名称</label>
      <input type="text" id="apiModel" placeholder="deepseek-chat" />
    </div>

    <div class="cgia-form-row">
      <label>API 地址（Base URL）</label>
      <input type="text" id="apiBaseUrl" placeholder="https://api.deepseek.com" />
    </div>

    <div class="cgia-form-row cgia-inline-actions">
      <button type="button" id="testBtn" class="cgia-secondary-btn">测试连接</button>
      <span id="testMsg" class="cgia-inline-msg"></span>
    </div>

    <hr class="cgia-divider" />

    <h2 class="cgia-section-title">笔记采集</h2>
    <p class="cgia-note-count" id="noteCount">便签：加载中…</p>

    <div class="cgia-form-row">
      <label>默认笔记类型</label>
      <select id="defaultNoteType"></select>
    </div>

    <div class="cgia-form-row">
      <label>JSONL 保存子目录</label>
      <input type="text" id="jsonlRecordDir" placeholder="Record" />
      <span class="cgia-field-hint">相对 Chrome 下载目录，默认保存到 ~/Downloads/Record/</span>
    </div>

    <div class="cgia-form-row">
      <label>导出范围</label>
      <select id="exportScope">
        <option value="page">当前页便签</option>
        <option value="all">全部便签</option>
      </select>
    </div>

    <div class="cgia-form-row cgia-export-options">
      <label class="cgia-check-label">
        <input type="checkbox" id="exportExcludeEmpty" />
        排除无选中文本
      </label>
      <label class="cgia-check-label">
        <input type="checkbox" id="exportExcludeNoFollowups" />
        排除无追问记录
      </label>
      <label class="cgia-check-label">
        <input type="checkbox" id="exportMergeByUrl" />
        同 URL 合并为一条 JSONL
      </label>
    </div>

    <div class="cgia-export-preview" id="exportPreview">
      <p class="cgia-export-preview-title">导出预览</p>
      <p class="cgia-export-preview-line" id="exportPreviewCount">—</p>
      <p class="cgia-export-preview-line" id="exportPreviewTypes">—</p>
      <p class="cgia-export-preview-line" id="exportPreviewTopics">—</p>
    </div>

    <div class="cgia-form-row cgia-export-actions">
      <button type="button" id="exportJsonlBtn" class="cgia-secondary-btn">导出 JSONL</button>
    </div>
    <p id="exportMsg" class="cgia-save-msg"></p>

    <hr class="cgia-divider" />

    <div class="cgia-form-row">
      <label>请求超时（毫秒）</label>
      <input type="number" id="requestTimeoutMs" min="5000" max="120000" step="1000" />
    </div>

    <div class="cgia-form-row">
      <label>选中文本最大长度</label>
      <input type="number" id="maxSelectedTextLength" min="100" max="10000" />
    </div>

    <div class="cgia-form-row">
      <label>上下文最大长度</label>
      <input type="number" id="surroundingTextMaxLength" min="200" max="5000" />
    </div>

    <div class="cgia-form-row">
      <label>
        <input type="checkbox" id="autoRestoreNotes" />
        刷新后自动恢复旁注
      </label>
    </div>

    <div class="cgia-form-row">
      <label>
        <input type="checkbox" id="includeFullMessage" />
        附带选区所在整条回答
      </label>
    </div>

    <div class="cgia-form-row">
      <label>
        <input type="checkbox" id="includeMainConversation" />
        附带最近几轮主对话
      </label>
    </div>

    <p class="cgia-tip">
      API Key 仅保存在本机浏览器中。导出的 JSONL 含你选中的文本、旁注追问与标记，格式见 docs/jsonl-schema.md。
    </p>

    <button id="saveBtn">保存设置</button>
    <p id="saveMsg" class="cgia-save-msg"></p>

    <script src="../shared/note_schema.js"></script>
    <script src="../shared/export_jsonl.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
